<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biboy</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#050505;
    color:white;
    font-family:Inter,sans-serif;
}

/* Animated background */

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(140,0,255,.25), transparent 30%),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,.08), transparent 25%),
    radial-gradient(circle at 50% 80%, rgba(80,0,255,.15), transparent 35%),
    #050505;
    animation:bgMove 12s infinite alternate ease-in-out;
}

@keyframes bgMove{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}

/* Enter screen */

#enter{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    cursor:pointer;
}

#enter h1{
    font-family:'UnifrakturCook',cursive;
    font-size:4rem;
    letter-spacing:4px;
}

/* Profile */

.container{
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:10;
}

.card{
    width:500px;
    max-width:90%;
    text-align:center;

    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.08);

    padding:40px;
    border-radius:30px;

    box-shadow:
    0 0 80px rgba(120,0,255,.25);
}

.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,255,255,.3);
}

.name{
    margin-top:15px;
    font-family:'UnifrakturCook',cursive;
    font-size:3.5rem;
}

.status{
    color:#a9a9a9;
    margin-top:10px;
}

.bio{
    margin-top:25px;
    min-height:80px;
    color:#ddd;
    line-height:1.8;
}

/* Socials */

.socials{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:25px;
}

.socials a{
    color:white;
    font-size:28px;
    transition:.3s;
}

.socials a:hover{
    transform:translateY(-5px);
    color:#9f6fff;
}

/* Floating particles */

.flake{
    position:fixed;
    width:5px;
    height:5px;
    border-radius:50%;
    background:white;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:
        translateY(150px)
        rotate(360deg);
        opacity:0;
    }
}

/* typing cursor */

.cursor{
    border-right:2px solid white;
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

</style>
</head>
<body>

<div class="bg"></div>

<audio id="music" loop>
<source src="https://YOUR-MUSIC-LINK.mp3" type="audio/mpeg">
</audio>

<div id="enter">
    <h1>Enter</h1>
</div>

<div class="container" id="main">

<div class="card">

<img
class="avatar"
src="https://images-ext-1.discordapp.net/external/dUpnEXz4UcjmQp9W2HGjEgrMJf18WXsdkUNsLC1UJmI/%3Fsize%3D4096%26ignore%3Dtrue)./https/cdn.discordapp.com/avatars/1254550540562468914/682ccdfea096b0689f4fcd51daf71a28.png?format=webp&quality=lossless">

<div class="name">
𝔇𝔦𝔞𝔷
</div>

<div class="status">
Developer • Gamer • Designer
</div>

<div class="bio">
<span id="typing" class="cursor"></span>
</div>

<div class="socials">

<a href="https://discord.com/users/YOUR_ID" target="_blank">
<i class="fab fa-discord"></i>
</a>

<a href="https://instagram.com/YOUR_USERNAME" target="_blank">
<i class="fab fa-instagram"></i>
</a>

<a href="https://tiktok.com/@YOUR_USERNAME" target="_blank">
<i class="fab fa-tiktok"></i>
</a>

</div>

</div>

</div>

<script>

const enter=document.getElementById('enter');
const main=document.getElementById('main');
const music=document.getElementById('music');

enter.onclick=()=>{

enter.style.opacity='0';

setTimeout(()=>{
enter.style.display='none';
main.style.display='flex';
music.play();
typeWriter();
},800);

};

/* About me animation */

const text=
"Welcome to my profile. Creating things, gaming, and exploring the web.";

let i=0;

function typeWriter(){

if(i<text.length){

document.getElementById('typing').innerHTML+=text.charAt(i);

i++;

setTimeout(typeWriter,50);

}

}

/* Mouse snowflakes */

document.addEventListener('mousemove',e=>{

const flake=document.createElement('div');

flake.className='flake';

flake.style.left=e.clientX+'px';
flake.style.top=e.clientY+'px';

flake.style.width=
Math.random()*6+2+'px';

flake.style.height=
flake.style.width;

document.body.appendChild(flake);

setTimeout(()=>{
flake.remove();
},2000);

});

</script>

</body>
</html>
