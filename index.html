<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Bio</title>

<style>
{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

#enter{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
z-index:1000;
cursor:pointer;
}

#enter h1{
font-size:4rem;
letter-spacing:4px;
text-shadow:0 0 20px white;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
opacity:.5;
}
}

#main{
display:none;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.profile{
width:420px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 0 40px rgba(255,255,255,.1);
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
margin-bottom:15px;
}

.username{
font-size:2rem;
font-weight:bold;
}

.bio{
margin-top:10px;
opacity:.8;
line-height:1.5;
}

.links{
margin-top:25px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.links a{
padding:10px 18px;
border-radius:12px;
background:rgba(255,255,255,.08);
text-decoration:none;
color:white;
transition:.3s;
}

.links a:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.15);
}

.music-btn{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:12px;
background:white;
color:black;
cursor:pointer;
font-weight:bold;
}

.views{
margin-top:20px;
opacity:.6;
font-size:.9rem;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="enter">
<h1>ENTER</h1>
<p>click anywhere</p>
</div>

<div id="main">

<div class="profile">

<!-- CHANGE THESE -->

<img class="avatar"
src="https://i.imgur.com/4M34hi2.png">

<div class="username">YOUR NAME</div>

<div class="bio">
Discord Developer • Gamer • Designer
</div>

<div class="links">
<a href="#">Discord</a>
<a href="#">GitHub</a>
<a href="#">TikTok</a>
<a href="#">YouTube</a>
</div>

<button class="music-btn" onclick="toggleMusic()">
Play / Pause Music
</button>

<div class="views">
Custom Profile Website
</div>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const enter=document.getElementById("enter");
const main=document.getElementById("main");
const music=document.getElementById("music");

enter.addEventListener("click",()=>{
enter.style.display="none";
main.style.display="flex";
music.play().catch(()=>{});
});

function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

/ PARTICLES /

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()canvas.width,
y:Math.random()canvas.height,
size:Math.random()3,
speed:Math.random()1+0.2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI2);
ctx.fill();

p.y+=p.speed;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});
</script>

</body>
</html>
